version: 2

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: pen
    binary: pen
    main: ./cmd/pen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README.md
      - docs/INSTALL.md
      - docs/RUNNING.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: edbnme
    name: pen
  draft: false
  prerelease: auto
  name_template: "PEN v{{.Version}}"

brews:
  - repository:
      owner: edbnme
      name: homebrew-pen
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
    homepage: "https://github.com/edbnme/pen"
    description: "AI-powered browser performance engineering via MCP"
    install: |
      bin.install "pen"
    test: |
      system bin/"pen", "--version"

scoops:
  - repository:
      owner: edbnme
      name: scoop-pen
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    skip_upload: "{{ if .Env.SCOOP_BUCKET_TOKEN }}false{{ else }}true{{ end }}"
    homepage: "https://github.com/edbnme/pen"
    description: "AI-powered browser performance engineering via MCP"
