version: 2

env:
  - CGO_ENABLED=0

before:
  hooks:
    - go mod tidy
    - go vet ./...

snapshot:
  version_template: "{{ incpatch .Version }}-next"

report_sizes: true

builds:
  - id: pen
    binary: pen
    main: ./cmd/pen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README.md
      - CHANGELOG.md
      - docs/INSTALL.md
      - docs/RUNNING.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Refactoring"
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "Others"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: edbnme
    name: pen
  draft: false
  prerelease: auto
  name_template: "PEN v{{.Version}}"
  header: |
    ## What's in this release

    PEN — AI-powered browser performance engineering via MCP.
  footer: |
    **Full Changelog**: https://github.com/edbnme/pen/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---
    _Built with [GoReleaser](https://goreleaser.com)._

homebrew_casks:
  - repository:
      owner: edbnme
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"
    homepage: "https://github.com/edbnme/pen"
    description: "AI-powered browser performance engineering via MCP"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/pen"]
          end

scoops:
  - repository:
      owner: edbnme
      name: scoop-pen
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    skip_upload: "{{ if .Env.SCOOP_BUCKET_TOKEN }}false{{ else }}true{{ end }}"
    homepage: "https://github.com/edbnme/pen"
    description: "AI-powered browser performance engineering via MCP"
