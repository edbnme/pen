version: "3"

vars:
  BINARY: pen
  MAIN: ./cmd/pen
  COVERAGE_FILE: coverage.txt

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Build the binary
    cmds:
      - go build -trimpath -o {{.BINARY}} {{.MAIN}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  test:
    desc: Run all tests with race detector
    cmds:
      - go test -race -count=1 ./...

  coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -race -coverprofile={{.COVERAGE_FILE}} -count=1 ./...
      - go tool cover -func={{.COVERAGE_FILE}}

  coverage:html:
    desc: Generate HTML coverage report
    cmds:
      - go test -race -coverprofile={{.COVERAGE_FILE}} -count=1 ./...
      - go tool cover -html={{.COVERAGE_FILE}} -o coverage.html

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run --timeout=5m

  lint:fix:
    desc: Run golangci-lint with auto-fix
    cmds:
      - golangci-lint run --fix --timeout=5m

  vulncheck:
    desc: Run govulncheck for known vulnerabilities
    cmds:
      - govulncheck ./...

  tidy:
    desc: Tidy and verify go modules
    cmds:
      - go mod tidy
      - go mod verify

  check:
    desc: Run all checks (vet, lint, vulncheck, test)
    cmds:
      - task: vet
      - task: lint
      - task: vulncheck
      - task: test

  release:dry:
    desc: Dry-run GoReleaser (snapshot)
    cmds:
      - goreleaser release --snapshot --clean

  release:check:
    desc: Validate GoReleaser config
    cmds:
      - goreleaser check

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} {{.BINARY}}.exe
      - rm -f {{.COVERAGE_FILE}} coverage.html
      - rm -rf dist/
